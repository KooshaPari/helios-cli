name: Policy Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: policy-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce namespace ownership
        env:
          ALLOWED_NAMESPACE: KooshaPari
          ALLOWED_BOTS: github-actions[bot],dependabot[bot],dependabot-preview[bot],renovate[bot],app/github-actions
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_OWNER: ${{ github.event.pull_request.head.repo.owner.login }}
        run: |
          set -euo pipefail

          if [[ -z "$PR_AUTHOR" ]]; then
            echo "ERROR: Unable to read PR author."
            exit 1
          fi

          is_bot_author=0
          IFS=',' read -ra bots <<< "$ALLOWED_BOTS"
          for bot in "${bots[@]}"; do
            if [[ "$bot" == "$PR_AUTHOR" ]]; then
              is_bot_author=1
              break
            fi
          done

          if [[ "$is_bot_author" -eq 1 ]]; then
            echo "Allowed bot author: $PR_AUTHOR"
            exit 0
          fi

          if [[ "$PR_AUTHOR" != "$ALLOWED_NAMESPACE" || "$HEAD_OWNER" != "$ALLOWED_NAMESPACE" ]]; then
            echo "ERROR: PR must come from namespace '$ALLOWED_NAMESPACE'."
            echo "Author: $PR_AUTHOR"
            echo "Head repo owner: $HEAD_OWNER"
            exit 1
          fi

          echo "Namespace ownership policy passed."

      - name: Enforce layered fix PR policy
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          echo "HEAD_REF=$HEAD_REF"
          echo "BASE_REF=$BASE_REF"
          echo "PR_LABELS=$PR_LABELS"

          if [[ "$HEAD_REF" == fix/* ]]; then
            if [[ "$BASE_REF" == "main" || "$BASE_REF" == "master" ]]; then
              if [[ "$PR_LABELS" != *"layered-pr-exception"* ]]; then
                echo "ERROR: fix/* PRs must target a layered branch, not main/master."
                echo "Use stack/*, layer/*, release/*, or add label layered-pr-exception."
                exit 1
              fi
            fi
          fi

          # Integration sync branches may intentionally contain merge commits.
          if [[ "$HEAD_REF" == merge/* || "$HEAD_REF" == sync/* ]]; then
            echo "Skipping merge-commit policy check for integration branch: $HEAD_REF"
            exit 0
          fi

          git fetch origin "$BASE_REF" --depth=1 || true
          PR_HEAD="${{ github.event.pull_request.head.sha }}"
          MERGES=$(git rev-list --merges "origin/$BASE_REF..$PR_HEAD" || true)
          if [[ -n "$MERGES" ]]; then
            echo "ERROR: merge commits detected in PR diff range:"
            echo "$MERGES"
            exit 1
          fi

          echo "Policy gate passed."
