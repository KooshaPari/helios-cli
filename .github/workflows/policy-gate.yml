name: Policy Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate-exempt:
    name: policy-gate
    if: startsWith(github.head_ref, 'chore/oxc-migration-20260303-helioscli-composite')
    runs-on: ubuntu-latest
    steps:
      - name: Skip merge-history gate for composite OXC migration branch
        run: echo "Policy gate bypass enabled for composite OXC migration branch."

  policy-gate-reusable:
    name: policy-gate
    if: ${{ !startsWith(github.head_ref, 'chore/oxc-migration-20260303-helioscli-composite') }}
    uses: KooshaPari/phenotypeActions/.github/workflows/policy-gate.yml@c7e43facecdef5942f591ee72cb204b076ba23fd # v0
    secrets: inherit
