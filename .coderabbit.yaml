# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

reviews:
  # Most comprehensive review mode; surfaces lower-impact findings as well.
  profile: assertive
  # Allow CodeRabbit to request/clear changes based on unresolved review state.
  request_changes_workflow: true
  auto_review:
    enabled: true
    auto_incremental_review: true

# Keep these as warnings so we do not block merges on doc/title hygiene,
# while still enforcing review findings via request_changes_workflow.
pre_merge_checks:
  docstrings:
    mode: warning
  title:
    mode: warning
  description:
    mode: warning
  issue_assessment:
    mode: warning
